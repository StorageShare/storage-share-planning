name: Deploy

# Draait pas nadat de CI-workflow op `main` succesvol is afgerond.
# (workflow_run werkt alleen als de default branch in GitHub op `main` staat.)
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  # Handmatig kunnen deployen (bijv. om de SSH-verbinding te testen).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Bij workflow_run alleen deployen als de CI groen was;
    # bij handmatige dispatch altijd.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # GitHub-secrets strippen de afsluitende newline; een OpenSSH-key moet
      # daar wel mee eindigen. We schrijven de key daarom naar een bestand en
      # voegen de newline terug toe, en gebruiken key_path i.p.v. inline key.
      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > "$RUNNER_TEMP/deploy_key"
          chmod 600 "$RUNNER_TEMP/deploy_key"
          echo "key_bytes=$(wc -c < "$RUNNER_TEMP/deploy_key")"
          echo "fingerprint:"
          ssh-keygen -lf "$RUNNER_TEMP/deploy_key" || echo "PARSE_FAIL"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ runner.temp }}/deploy_key
          script: |
            bash /home/master/applications/planning/public_html/deploy.sh
